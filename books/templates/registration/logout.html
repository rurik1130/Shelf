<!doctype html>
{% extends 'base.html' %}

{% block title %}
  ログアウト確認
{% endblock %}

{% block content %}
  <section class="auth-card">
    <h1 class="auth-title">ログアウト確認</h1>
    <p class="auth-message">ログアウトしますか？</p>

    <form action="{% url 'accounts:logout_confirm' %}" method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-large">ログアウト</button>
    </form>

    <div class="auth-footer">
      <p><a href="/" onclick="history.back(); return false;" class="link-secondary">戻る</a></p>
    </div>
  </section>
{% endblock %}

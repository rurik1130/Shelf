<!doctype html>
{% extends "base.html" %}
{% load static %}

{% block title %}予約キャンセル完了 - Shelf{% endblock %}

{% block content %}
<div class="auth-card">
  <div class="text-center">
    <div class="success-icon success-icon-primary">✓</div>
    <h1 class="auth-title">予約をキャンセルしました</h1>
  </div>

  <p class="auth-message">
    対象の書籍の予約取り消しが完了しました
  </p>

  <div class="procedure-target">
    <img src="{{ book.cover_image_url|default:'https://via.placeholder.com/80?text=No+Image' }}"
         alt="{{ book.title }}"
         class="book-cover"
         onerror="this.src='https://via.placeholder.com/80?text=No+Image'">
    
    <div class="delete-target-info">
      <p class="book-title">{{ book.title }}</p>
      <p class="book-author">{{ book.author }}</p>
    </div>
  </div>

  <div class="auth-footer">
    <a href="{% url 'books:mypage' %}" class="btn btn-primary btn-large">マイページへ戻る</a>
    
    <div class="text-center mt-1">
      <a href="{% url 'books:book_list' %}" class="link-secondary">ホームへ戻る</a>
    </div>
  </div>
</div>
{% endblock %}
